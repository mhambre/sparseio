name: CI / Ubuntu

on:
  workflow_dispatch:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

jobs:
  unit:
    uses: ./.github/workflows/unit.yml
    with:
      runner: ubuntu-latest

  integration:
    uses: ./.github/workflows/integration.yml
    with:
      runner: ubuntu-latest

  quality:
    needs: [unit, integration]
    uses: ./.github/workflows/quality.yml
    with:
      runner: ubuntu-latest
