name: CI / Ubuntu

on:
  workflow_dispatch:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

jobs:
  quality:
    name: Quality
    uses: ./.github/workflows/quality.yml
    with:
      runner: ubuntu-latest

  unit:
    name: Unit
    needs: [quality]
    uses: ./.github/workflows/unit.yml
    with:
      runner: ubuntu-latest

  integration:
    name: Integration
    needs: [quality]
    uses: ./.github/workflows/integration.yml
    with:
      runner: ubuntu-latest
